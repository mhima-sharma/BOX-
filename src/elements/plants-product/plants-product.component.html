<main class="flex-1 bg-[#F6F1EB] min-h-screen">

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">

    <!-- CATEGORY SECTION -->
    <div class="mb-20 text-center">

      <h3 class="text-2xl sm:text-3xl font-[Playfair_Display] tracking-[0.2em] mb-10 text-[#3E2F2B]">
        Explore Categories
      </h3>

      <div class="grid grid-cols-2 sm:grid-cols-4 gap-8">

        <div class="flex flex-col items-center group cursor-pointer"
          *ngFor="let category of [
            { name: 'Luxury Boxes', img: 'https://images.unsplash.com/photo-1585386959984-a41552231658?q=80&w=500' },
            { name: 'Premium Hampers', img: 'https://images.unsplash.com/photo-1607082350927-9aeeb0a8c1e1?q=80&w=500' },
            { name: 'Corporate Gifts', img: 'https://images.unsplash.com/photo-1607082349566-187342175e2f?q=80&w=500' },
            { name: 'Elegant Add-Ons', img: 'https://images.unsplash.com/photo-1513883049090-d0b7439799bf?q=80&w=500' }
          ]">

          <div class="w-20 h-20 sm:w-24 sm:h-24 rounded-full overflow-hidden border border-[#C6A76E]">
            <img [src]="category.img" class="w-full h-full object-cover transition duration-300 group-hover:scale-105" />
          </div>

          <p class="mt-3 text-sm tracking-wide text-[#3E2F2B]">
            {{ category.name }}
          </p>

        </div>
      </div>
    </div>


    <!-- SECTION TITLE -->
    <div class="text-center mb-10">
      <h2 class="text-3xl sm:text-4xl font-[Playfair_Display] tracking-[0.2em] text-[#3E2F2B]">
        Our Collection
      </h2>
      <div class="w-16 h-[1px] bg-[#C6A76E] mx-auto mt-4"></div>
    </div>


    <!-- SEARCH BAR -->
    <div class="flex justify-center mb-14 px-2">
      <form class="w-full max-w-xl flex"
            (submit)="onSearch($event)">

        <input
          type="text"
          [(ngModel)]="searchQuery"
          name="search"
          placeholder="Search products..."
          class="w-full px-5 py-3 text-sm border border-[#E6D2C4] bg-white focus:outline-none focus:border-[#C6A76E]"
        />

        <button
          type="submit"
          class="px-6 bg-[#C6A76E] text-white text-sm tracking-wide hover:opacity-90 transition">
          Search
        </button>

      </form>
    </div>


    <!-- PRODUCT GRID -->
    <div *ngIf="filteredProducts.length > 0; else noResults">

      <div class="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">

        <div
          class="group bg-white p-5 text-center transition duration-300 hover:-translate-y-1"
          *ngFor="let product of visibleProducts">

          <div class="h-44 sm:h-52 flex items-center justify-center mb-4 overflow-hidden">
            <img
              class="max-h-full object-contain transition duration-300 group-hover:scale-105"
              [src]="(product.images?.split(',')[0] || 'assets/placeholder.jpg')"
              [alt]="product.title" />
          </div>

          <h3 class="text-sm sm:text-base font-medium text-[#3E2F2B] truncate">
            {{ product.title || 'Untitled Item' }}
          </h3>

          <p class="text-[#C6A76E] font-semibold mt-2">
            ₹{{ product.price || 'N/A' }}
          </p>

          <button
            (click)="viewDetails(product.id)"
            class="mt-4 w-full border border-[#C6A76E] text-[#3E2F2B] py-2 text-sm tracking-wide hover:bg-[#C6A76E] hover:text-white transition">
            View Details
          </button>

        </div>

      </div>


      <!-- SHOW MORE -->
      <div class="mt-14 text-center" *ngIf="!showAll && filteredProducts.length > 8">
        <button
          (click)="toggleShowAll()"
          class="px-8 py-2 border border-[#C6A76E] text-[#3E2F2B] hover:bg-[#C6A76E] hover:text-white transition">
          Show More
        </button>
      </div>

    </div>


    <!-- NO RESULTS -->
    <ng-template #noResults>
      <p class="text-center text-gray-500 mt-16">
        No matching products found.
      </p>
    </ng-template>

  </div>

</main>
