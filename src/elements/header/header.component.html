  <div class="max-w-7xl mx-auto px-4 sm:px-8 py-2 flex justify-between items-center">

    <!-- LEFT SOCIAL -->
    <div class="flex gap-3 sm:gap-4 opacity-80">



  <!-- Instagram -->
  <a
    href="https://www.instagram.com/YOUR_USERNAME"
    target="_blank"
    aria-label="Instagram">

    <i class="fab fa-instagram cursor-pointer hover:text-[#C6A76E] transition"></i>

  </a>


  <!-- Facebook -->
  <a
    href="https://www.facebook.com/YOUR_USERNAME"
    target="_blank"
    aria-label="Facebook">

    <i class="fab fa-facebook cursor-pointer hover:text-[#C6A76E] transition"></i>

  </a>


  <!-- Twitter / X -->
  <a
    href="https://twitter.com/YOUR_USERNAME"
    target="_blank"
    aria-label="Twitter">

    </div>

    <!-- RIGHT LINKS -->
    <div class="hidden sm:flex gap-6 tracking-[0.25em] uppercase text-[10px]">
      <a routerLink="/intro" class="hover:text-[#C6A76E] transition">About</a>
      <a routerLink="/contact" class="hover:text-[#C6A76E] transition">Contact</a>

  </div>

<!-- MAIN HEADER -->
<!-- MAIN HEADER -->
<header class="w-full bg-[#D8BFAE] border-b border-[#EADFD6] relative z-40">

  <div class="max-w-7xl mx-auto px-4 sm:px-8 py-4 sm:py-6">

    <!-- FLEX CONTAINER -->
    <div class="flex items-center justify-between">

      <!-- LEFT -->
      <div class="flex items-center gap-4">

        <!-- MOBILE MENU BUTTON -->
        <button
          class="sm:hidden text-[#3E2F2B] text-xl"
          (click)="isMenuOpen = !isMenuOpen">

          <i class="fas fa-bars"></i>

        </button>


        <!-- DESKTOP NAV -->
        <div class="hidden sm:flex gap-10 text-xs tracking-[0.35em] uppercase text-[#3E2F2B]">

          <a routerLink="/show" class="hover:text-[#C6A76E] transition duration-300">
            Home
          </a>

          <a routerLink="/store" class="hover:text-[#C6A76E] transition duration-300">
            Shop
          </a>

        </div>

      </div>



      <!-- CENTER LOGO -->
      <div class="text-center flex-1 sm:flex-none">

        <a
          routerLink="/"
          class="text-2xl sm:text-3xl tracking-[0.5em] text-[#F6F1EB] font-[Playfair_Display]">

          BOXÉ

        </a>

      </div>



      <!-- RIGHT ICONS -->
      <div class="flex items-center gap-5 sm:gap-8 text-sm text-[#3E2F2B]">

        <!-- CART -->
        <a routerLink="/show-cart">

          <i class="fas fa-shopping-bag cursor-pointer hover:text-[#C6A76E] transition"></i>

        </a>


        <!-- USER / LOGOUT -->
        <ng-container *ngIf="isLoggedIn; else loginIcon">

          <button
            (click)="openLogoutPopup()"
            class="uppercase text-[10px] tracking-[0.25em] hover:text-[#C6A76E] transition">

            Logout

          </button>

        </ng-container>


        <ng-template #loginIcon>

          <i
            class="fas fa-user cursor-pointer hover:text-[#C6A76E] transition"
            routerLink="/user-login">

          </i>

        </ng-template>

      </div>


    </div>

  </div>



  <!-- MOBILE MENU -->
  <div
    *ngIf="isMenuOpen"
    class="sm:hidden bg-[#EADFD6] border-t border-[#D8BFAE] px-6 py-4 space-y-4 text-sm tracking-[0.3em] uppercase text-[#3E2F2B]">

    <a routerLink="/show" class="block hover:text-[#C6A76E]" (click)="isMenuOpen=false">
      Home
    </a>

    <a routerLink="/store" class="block hover:text-[#C6A76E]" (click)="isMenuOpen=false">
      Shop
    </a>

    <a routerLink="/intro" class="block hover:text-[#C6A76E]" (click)="isMenuOpen=false">
      About
    </a>

    <a routerLink="/contact" class="block hover:text-[#C6A76E]" (click)="isMenuOpen=false">
      Contact
    </a>


    <ng-container *ngIf="isLoggedIn; else mobileLogin">

      <button
        (click)="openLogoutPopup()"
        class="block w-full text-left hover:text-[#C6A76E]">

        Logout

      </button>

    </ng-container>


    <ng-template #mobileLogin>

      <a
        routerLink="/user-login"
        class="block hover:text-[#C6A76E]"
        (click)="isMenuOpen=false">

        Login

      </a>

    </ng-template>

  </div>

</header>


<!-- LOGOUT MODAL -->
<div
  *ngIf="showLogoutModal"
  class="fixed inset-0 bg-black/40 flex items-center justify-center z-50">

  <div class="bg-[#F6F1EB] rounded-lg w-[90%] max-w-sm p-6 text-center shadow-xl">

    <h3 class="text-lg font-semibold text-[#3E2F2B] mb-2">

      Confirm Logout

    </h3>


    <p class="text-sm text-[#6B5A54] mb-6">

      Are you sure you want to logout?

    </p>


    <div class="flex justify-center gap-4">

      <button
        (click)="closeLogoutPopup()"
        class="px-4 py-2 text-xs uppercase tracking-wider border border-[#3E2F2B] text-[#3E2F2B] hover:bg-[#3E2F2B] hover:text-white transition">

        Cancel

      </button>


      <button
        (click)="confirmLogout()"
        class="px-4 py-2 text-xs uppercase tracking-wider bg-[#3E2F2B] text-white hover:opacity-90 transition">

        Logout

      </button>


    </div>

  </div>

</div>
