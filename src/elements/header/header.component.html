<!-- TOP BAR -->
<div class="w-full text-[10px] sm:text-[11px] theme-topbar">
  <div class="max-w-7xl mx-auto px-4 sm:px-8 py-2 flex justify-between items-center">

    <!-- LEFT SOCIAL -->
    <div class="flex gap-3 sm:gap-4 opacity-80">



  <!-- Instagram -->
  <a
    href="https://www.instagram.com/YOUR_USERNAME"
    target="_blank"
    aria-label="Instagram">

    <i class="fab fa-instagram cursor-pointer theme-hover transition"></i>

  </a>


  <!-- Facebook -->
  <a
    href="https://www.facebook.com/YOUR_USERNAME"
    target="_blank"
    aria-label="Facebook">

    <i class="fab fa-facebook cursor-pointer theme-hover transition"></i>

  </a>


  <!-- Twitter / X -->
  <a
    href="https://twitter.com/YOUR_USERNAME"
    target="_blank"
    aria-label="Twitter">

    <i class="fab fa-twitter cursor-pointer theme-hover transition"></i>

  </a>



    </div>

    <!-- RIGHT LINKS -->
    <div class="hidden sm:flex gap-6 tracking-[0.25em] uppercase text-[10px]">
      <a routerLink="/intro" class="theme-hover transition">About</a>
      <a routerLink="/contact" class="theme-hover transition">Contact</a>
    </div>

  </div>
</div>


<!-- MAIN HEADER -->
<header class="w-full theme-navbar relative z-40">

  <div class="max-w-7xl mx-auto px-4 sm:px-8 py-4 sm:py-6 flex items-center justify-between">

    <!-- MOBILE MENU BUTTON -->
    <button
      class="sm:hidden text-xl"
      (click)="isMenuOpen = !isMenuOpen">

      <i class="fas fa-bars"></i>

    </button>


    <!-- LEFT DESKTOP NAV -->
    <div class="hidden sm:flex gap-10 text-xs tracking-[0.35em] uppercase">

      <a routerLink="/show" class="theme-hover transition duration-300">
        Home
      </a>

      <a routerLink="/store" class="theme-hover transition duration-300">
        Shop
      </a>

    </div>


    <!-- LOGO -->
    <div class="absolute left-1/2 transform -translate-x-1/2 sm:static sm:transform-none text-center">

      <a
        routerLink="/"
        class="text-2xl sm:text-3xl tracking-[0.5em] font-[Playfair_Display] theme-logo">

        BOXÉ

      </a>

    </div>


    <!-- RIGHT ICONS -->
    <div class="flex items-center gap-5 sm:gap-8 text-sm">

      <!-- THEME TOGGLE -->
      <button
        type="button"
        class="theme-toggle"
        (click)="toggleTheme()"
        [attr.aria-label]="isDarkTheme ? 'Switch to light theme' : 'Switch to dark theme'">

        <i *ngIf="isDarkTheme" class="fas fa-sun"></i>
        <i *ngIf="!isDarkTheme" class="fas fa-moon"></i>

      </button>


      <!-- CART -->
      <a routerLink="/show-cart" class="theme-hover transition">

        <i class="fas fa-shopping-bag cursor-pointer"></i>

      </a>


      <!-- USER / LOGOUT -->
      <ng-container *ngIf="isLoggedIn; else loginIcon">

        <button
          (click)="openLogoutPopup()"
          class="uppercase text-[10px] tracking-[0.25em] theme-hover transition">

          Logout

        </button>

      </ng-container>


      <ng-template #loginIcon>

        <i
          class="fas fa-user cursor-pointer theme-hover transition"
          routerLink="/user-login">

        </i>

      </ng-template>


    </div>

  </div>



  <!-- MOBILE MENU -->
  <div
    *ngIf="isMenuOpen"
    class="sm:hidden theme-navbar theme-menu px-6 py-4 space-y-4 text-sm tracking-[0.3em] uppercase">

    <a routerLink="/show" class="block theme-hover" (click)="isMenuOpen=false">
      Home
    </a>

    <a routerLink="/store" class="block theme-hover" (click)="isMenuOpen=false">
      Shop
    </a>

    <a routerLink="/intro" class="block theme-hover" (click)="isMenuOpen=false">
      About
    </a>

    <a routerLink="/contact" class="block theme-hover" (click)="isMenuOpen=false">
      Contact
    </a>



    <!-- MOBILE LOGIN / LOGOUT -->
    <ng-container *ngIf="isLoggedIn; else mobileLogin">

      <button
        (click)="openLogoutPopup()"
        class="block w-full text-left theme-hover">

        Logout

      </button>

    </ng-container>


    <ng-template #mobileLogin>

      <a
        routerLink="/user-login"
        class="block theme-hover"
        (click)="isMenuOpen=false">

        Login

      </a>

    </ng-template>

  </div>


</header>



<!-- LOGOUT MODAL -->
<div
  *ngIf="showLogoutModal"
  class="fixed inset-0 bg-black/40 flex items-center justify-center z-50">

  <div class="theme-card rounded-lg w-[90%] max-w-sm p-6 text-center">

    <h3 class="text-lg font-semibold mb-2">

      Confirm Logout

    </h3>


    <p class="text-sm theme-text-muted mb-6">

      Are you sure you want to logout?

    </p>


    <div class="flex justify-center gap-4">

      <button
        (click)="closeLogoutPopup()"
        class="px-4 py-2 text-xs uppercase tracking-wider theme-btn-outline transition">

        Cancel

      </button>


      <button
        (click)="confirmLogout()"
        class="px-4 py-2 text-xs uppercase tracking-wider theme-btn transition">

        Logout

      </button>


    </div>

  </div>

</div>



<!-- WHATSAPP FLOATING BUTTON -->
<a
  href="https://wa.me/917988543400?text=Hi%20BOXÉ,%20I%20need%20help"
  target="_blank"
  class="fixed bottom-4 right-4 sm:bottom-6 sm:right-6 z-50 group">


  <!-- pulse animation -->
  <span class="absolute inset-0 rounded-full bg-green-400 opacity-75 animate-ping"></span>


  <!-- main button -->
  <div
    class="relative flex items-center justify-center
           w-12 h-12 sm:w-14 sm:h-14
           bg-[#25D366]
           rounded-full
           shadow-lg
           hover:scale-110
           transition duration-300">


    <i class="fab fa-whatsapp text-white text-xl sm:text-2xl"></i>


  </div>


</a>
