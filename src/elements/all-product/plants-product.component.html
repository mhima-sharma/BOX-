<main class="flex-1 bg-[#F6F1EB] min-h-screen">

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">

    <!-- ================= CATEGORY SECTION ================= -->
    <section class="mb-16 text-center">

      <h3 class="text-2xl sm:text-3xl font-[Playfair_Display] tracking-widest text-[#3E2F2B]">
        Explore Categories
      </h3>

      <div class="flex flex-wrap justify-center gap-3 mt-6">
        <button
          *ngFor="let category of categories"
          (click)="selectedCategory = category"
          [ngClass]="selectedCategory === category 
            ? 'bg-[#C6A76E] text-white shadow-lg'
            : 'border border-[#C6A76E] text-[#3E2F2B] hover:bg-[#C6A76E] hover:text-white'"
          class="px-4 py-2 text-sm tracking-wider rounded-lg transition transform hover:scale-105">
          {{ category }}
        </button>
      </div>
    </section>

    <!-- ================= SEARCH ================= -->
    <section class="flex justify-center mb-16">
      <form
        class="w-full max-w-2xl flex border border-[#E6D2C4] bg-white shadow-md rounded-xl overflow-hidden"
        (submit)="onSearch($event)"
      >
        <input
          type="text"
          [(ngModel)]="searchQuery"
          name="search"
          placeholder="Search luxury gifts..."
          class="w-full px-4 py-3 text-sm focus:outline-none placeholder-[#A68C74]"
        />
        <button
          type="submit"
          class="px-6 bg-[#C6A76E] text-white text-sm tracking-wider hover:opacity-90 transition transform hover:scale-105"
        >
          Search
        </button>
      </form>
    </section>

    <!-- ================= PRODUCT GRID ================= -->
    <section *ngIf="filteredProducts.length > 0; else noResults">
      <div class="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">

        <div
          class="group bg-white p-4 rounded-xl shadow-md hover:shadow-xl transition duration-300 transform hover:-translate-y-1"
          *ngFor="let product of visibleProducts"
        >
          <div class="h-40 flex items-center justify-center mb-4 overflow-hidden bg-[#FAF7F3] rounded-lg">
            <img
              class="max-h-full object-contain transition duration-500 group-hover:scale-105"
              loading="lazy"
              [src]="(product.images?.split(',')[0] || 'assets/placeholder.jpg')"
              [alt]="product.title"
            />
          </div>

          <h3 class="text-sm sm:text-base font-medium text-[#3E2F2B] truncate tracking-wide">
            {{ product.title || 'Untitled Item' }}
          </h3>
          <p class="text-[#52504c] font-semibold mt-1 text-base">
            Total Quantity: {{ product.quantity || 'N/A' }}
          </p>
          <p class="text-[#C6A76E] font-semibold mt-1 text-base">
            ₹{{ product.price || 'N/A' }}
          </p>

          <button
            (click)="viewDetails(product.id)"
            class="mt-3 w-full border border-[#C6A76E] text-[#3E2F2B] py-2 text-sm tracking-wider rounded-lg hover:bg-[#C6A76E] hover:text-white transition transform hover:scale-105"
          >
            View Details
          </button>
        </div>
      </div>

      <!-- SHOW MORE -->
      <div class="mt-12 text-center" *ngIf="!showAll && filteredProducts.length > 8">
        <button
          (click)="toggleShowAll()"
          class="px-8 py-2 border border-[#C6A76E] text-[#3E2F2B] tracking-wider rounded-lg hover:bg-[#C6A76E] hover:text-white transition transform hover:scale-105"
        >
          Show More
        </button>
      </div>
    </section>

    <!-- ================= NO RESULTS ================= -->
    <ng-template #noResults>
      <p class="text-center text-[#8C7B70] mt-16 tracking-wide text-base">
        No matching products found.
      </p>
    </ng-template>

  </div>
</main>
