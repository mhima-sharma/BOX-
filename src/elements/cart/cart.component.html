<!-- Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/20 backdrop-blur-sm px-4">

  <!-- Modal -->
  <div class="bg-[#FDFBF7] w-full max-w-lg rounded-2xl shadow-[0_10px_40px_rgba(0,0,0,0.12)] p-6 flex flex-col relative border border-[#E8E2D9]">

    <!-- Header -->
    <div class="flex justify-between items-center mb-6">

      <div>
        <h2 class="text-xl sm:text-2xl font-semibold text-[#3E2F26] tracking-wide">
          Your Cart
        </h2>

        <p class="text-sm text-[#9C8A7A] mt-1">
          Review your selected plants
        </p>
      </div>

      <button
        routerLink="/show"
        class="text-[#9C8A7A] hover:text-[#3E2F26] text-3xl transition absolute top-4 right-4">
        &times;
      </button>

    </div>

    <!-- Body -->
    <div class="overflow-y-auto max-h-[55vh] pr-1">

      <!-- Empty State -->
      <div
        *ngIf="cartItems.length === 0"
        class="flex flex-col items-center justify-center text-center py-16 text-[#9C8A7A]">

        <p class="text-lg font-medium">
          Your cart is empty
        </p>

        <p class="text-sm mt-1">
          Discover our premium collection
        </p>

      </div>


      <!-- Cart Item -->
      <div
        *ngFor="let item of cartItems"
        class="flex gap-4 py-5 border-b border-[#ECE6DD] last:border-none">

        <!-- Image -->
        <img
          [src]="item.images"
          alt="Product Image"
          class="w-20 h-20 object-cover rounded-lg border border-[#ECE6DD]"
        />


        <!-- Info -->
        <div class="flex flex-col flex-1">

          <!-- Title -->
          <h3 class="text-[#3E2F26] font-medium text-base sm:text-lg">
            {{ item.title }}
          </h3>


          <!-- Price -->
          <p class="text-[#8B7355] text-sm mt-1">
            ₹{{ item.price }}
          </p>


          <!-- Quantity + Total -->
          <div class="flex items-center justify-between mt-3">

            <!-- Quantity -->
            <div class="flex items-center border border-[#D8CFC3] rounded-full">

              <button
                (click)="decreaseQuantity(item)"
                class="px-3 py-1 text-[#3E2F26] hover:bg-[#F3EEE7] rounded-l-full">

                −

              </button>


              <span class="px-3 text-sm font-medium text-[#3E2F26]">

                {{ item.quantity }}

              </span>


              <button
                (click)="increaseQuantity(item)"
                class="px-3 py-1 text-[#3E2F26] hover:bg-[#F3EEE7] rounded-r-full">

                +

              </button>

            </div>


            <!-- Total -->
            <p class="text-[#3E2F26] font-semibold text-sm">

              ₹{{ item.price * item.quantity }}

            </p>

          </div>

        </div>

      </div>

    </div>


    <!-- Premium Notice -->
    <div class="mt-6 mb-4 text-center text-sm text-[#8B7355] bg-[#F3EEE7] py-3 rounded-lg">

      Please confirm your selection before checkout

    </div>



    <!-- Footer Buttons -->
    <div class="flex flex-col sm:flex-row gap-3">

      <!-- Continue -->
      <button
        routerLink="/store"
        (click)="close()"
        class="w-full border border-[#D8CFC3]
               text-[#3E2F26]
               font-medium
               py-3
               rounded-full
               hover:bg-[#F3EEE7]
               transition">

        Continue Shopping

      </button>



      <!-- Buy Now -->
      <button
        (click)="onBuyNow(); close()"
        class="w-full
               bg-[#3E2F26]
               text-white
               font-medium
               py-3
               rounded-full
               hover:bg-[#2B1F18]
               transition
               shadow-sm">

        Checkout

      </button>


    </div>


  </div>

</div>
