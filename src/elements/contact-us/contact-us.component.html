<app-header></app-header>

<!-- HERO SLIDER -->
<div class="relative bg-[#F5EFE6] h-[260px] md:h-[360px] overflow-hidden">

  <div class="relative h-full">
    <div class="w-full h-full flex transition-all duration-700 ease-in-out"
         [style.transform]="'translateX(-' + (current * 100) + '%)'">

      <div *ngFor="let banner of banners"
           class="min-w-full h-full flex items-center justify-center">
        <img [src]="banner.image"
             alt="banner"
             class="w-full h-full object-cover" />
      </div>

    </div>

    <!-- Navigation Arrows -->
    <button (click)="prev()"
      class="absolute top-1/2 left-4 -translate-y-1/2
             bg-white/70 backdrop-blur-sm text-[#3E2C23]
             w-10 h-10 rounded-full shadow hover:bg-white transition">
      ‹
    </button>

    <button (click)="next()"
      class="absolute top-1/2 right-4 -translate-y-1/2
             bg-white/70 backdrop-blur-sm text-[#3E2C23]
             w-10 h-10 rounded-full shadow hover:bg-white transition">
      ›
    </button>

    <!-- Dots -->
    <div class="absolute bottom-5 left-1/2 -translate-x-1/2 flex gap-2">
      <span *ngFor="let banner of banners; let i = index"
            (click)="goTo(i)"
            class="w-2.5 h-2.5 rounded-full cursor-pointer transition"
            [ngClass]="{
              'bg-[#3E2C23]': current === i,
              'bg-[#CBB79C]': current !== i
            }">
      </span>
    </div>

  </div>
</div>

<!-- CHATBOT BUTTON -->
<div class="fixed bottom-6 right-6 z-50" *ngIf="!isChatbotOpen">
  <button
    (click)="toggleChatbot()"
    class="w-14 h-14 flex items-center justify-center
           bg-[#3E2C23] hover:bg-[#2C1F18]
           text-white rounded-full shadow-lg
           transition duration-300 hover:scale-105">
    <span class="text-xl">💬</span>
  </button>
</div>

<!-- CONTACT SECTION -->
<div class="max-w-6xl mx-auto px-4 py-16">

  <div class="grid grid-cols-1 md:grid-cols-2 gap-12
              bg-white border border-[#E6D7C3]
              rounded-3xl p-8 md:p-12
              shadow-[0_15px_40px_rgba(0,0,0,0.06)]">

    <!-- LEFT: FORM -->
    <div>
      <h2 class="text-3xl font-serif text-[#3E2C23] mb-8">
        Get in Touch
      </h2>

      <form class="space-y-6" (ngSubmit)="onSubmit()" #contactForm="ngForm">

        <input
          type="text"
          name="name"
          [(ngModel)]="formData.name"
          placeholder="Full Name *"
          required
          class="w-full px-4 py-3 rounded-xl
                 border border-[#E0D2C0]
                 bg-[#FAF7F2]
                 focus:border-[#B89B72]
                 focus:ring-1 focus:ring-[#C6A87D]
                 outline-none transition" />

        <input
          type="email"
          name="email"
          [(ngModel)]="formData.email"
          placeholder="Email Address *"
          required
          class="w-full px-4 py-3 rounded-xl
                 border border-[#E0D2C0]
                 bg-[#FAF7F2]
                 focus:border-[#B89B72]
                 focus:ring-1 focus:ring-[#C6A87D]
                 outline-none transition" />

        <input
          type="text"
          name="subject"
          [(ngModel)]="formData.subject"
          placeholder="Subject"
          class="w-full px-4 py-3 rounded-xl
                 border border-[#E0D2C0]
                 bg-[#FAF7F2]
                 focus:border-[#B89B72]
                 focus:ring-1 focus:ring-[#C6A87D]
                 outline-none transition" />

        <textarea
          name="message"
          [(ngModel)]="formData.message"
          rows="4"
          required
          placeholder="Your Message *"
          class="w-full px-4 py-3 rounded-xl
                 border border-[#E0D2C0]
                 bg-[#FAF7F2]
                 focus:border-[#B89B72]
                 focus:ring-1 focus:ring-[#C6A87D]
                 outline-none transition">
        </textarea>

        <button
          type="submit"
          class="w-full bg-[#3E2C23] hover:bg-[#2C1F18]
                 text-white py-3 rounded-full
                 text-sm tracking-widest uppercase
                 transition duration-300">
          Send Message
        </button>

        <p *ngIf="successMessage" class="text-[#3E2C23] text-sm mt-2">
          {{ successMessage }}
        </p>

        <p *ngIf="errorMessage" class="text-[#A94442] text-sm mt-2">
          {{ errorMessage }}
        </p>

      </form>
    </div>

    <!-- RIGHT: DETAILS -->
    <div class="space-y-8">
      <h2 class="text-3xl font-serif text-[#3E2C23]">
        Contact Details
      </h2>

      <div class="space-y-4 text-[#5E4A3B]">

        <div>
          <p class="text-sm uppercase tracking-widest text-[#B89B72]">Phone</p>
          <p class="mt-1">+91 79885__4__</p>
        </div>

        <div>
          <p class="text-sm uppercase tracking-widest text-[#B89B72]">Email</p>
          <p class="mt-1">{{ email }}</p>
        </div>

        <div>
          <p class="text-sm uppercase tracking-widest text-[#B89B72]">Location</p>
          <p class="mt-1">Online Store – No Physical Outlet</p>
        </div>

      </div>

      <!-- Map -->
      <div class="rounded-2xl overflow-hidden border border-[#E6D7C3] h-64">
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3023.421421148586!2d-73.95432308459473!3d40.778644879325084!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89c258eaa63c5a41%3A0xf9140fcbd5d7bbcf!2s1569%202nd%20Ave%2C%20New%20York%2C%20NY%2010028%2C%20USA!5e0!3m2!1sen!2sin!4v1620044678481!5m2!1sen!2sin"
          width="100%"
          height="100%"
          style="border:0;"
          loading="lazy">
        </iframe>
      </div>

    </div>

  </div>

</div>

<app-footer></app-footer>
