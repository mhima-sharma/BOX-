<!-- BOXÉ LUXURY CHECKOUT -->

<div class="min-h-screen bg-[#F6F2EC] py-8 px-4 sm:px-6 pb-32 sm:pb-8"
     [formGroup]="checkoutForm">

  <div class="max-w-5xl mx-auto">

    <!-- HEADER -->
    <div class="mb-10 text-center">

      <h1 class="text-[28px] sm:text-[34px]
                 font-serif
                 text-[#2B221A]
                 tracking-[0.08em]">
        CHECKOUT
      </h1>

      <p class="text-[#8B8074] text-sm mt-2 tracking-wide">
        Securely complete your order
      </p>

    </div>



    <!-- STEPPER -->
    <div class="flex justify-center mb-12">

      <div class="flex items-center gap-5">

        <div [class]="stepClass(1)"></div>

        <div class="step-line"></div>

        <div [class]="stepClass(2)"></div>

        <div class="step-line"></div>

        <div [class]="stepClass(3)"></div>

      </div>

    </div>



    <!-- CARD -->
    <div class="bg-white border border-[#E8E1D8] rounded-2xl shadow p-6 sm:p-10">


      <!-- STEP 1 -->
      <div *ngIf="currentStep===1">

        <h2 class="section-title">
          Billing Information
        </h2>

        <div class="grid sm:grid-cols-2 gap-5">

          <input formControlName="fullName"
                 placeholder="Full Name"
                 class="boxe-input sm:col-span-2">


          <input formControlName="email"
                 placeholder="Email Address"
                 class="boxe-input">


          <input formControlName="phoneNumber"
                 placeholder="Phone Number"
                 class="boxe-input">


          <textarea formControlName="shippingAddress"
                    placeholder="Shipping Address"
                    class="boxe-input sm:col-span-2">
          </textarea>

        </div>

        <div class="mt-10 text-right">

          <button (click)="nextStep()"
                  class="boxe-btn">
            Continue
          </button>

        </div>

      </div>



      <!-- STEP 2 -->
      <div *ngIf="currentStep===2">

        <h2 class="section-title">
          Order Summary
        </h2>

        <!-- <div *ngFor="let item of cartItems"
             class="flex justify-between py-4 border-b">

          <span>{{item.title}}</span>

          <span>₹{{item.price * item.quantity}}</span>

        </div> -->

         <div *ngFor="let item of cartItems"
               class="flex items-center gap-4 py-5">

            <img
              [src]="item.images?.split(',')[0]"
              class="w-16 h-20 object-cover rounded-md border border-[#EEE6DC]">


            <div class="flex-1">

              <p class="text-[#2B221A] text-sm">

                {{item.title}}

              </p>

              <p class="text-[#8B8074] text-xs mt-1">

                Quantity {{item.quantity}}

              </p>

            </div>


            <p class="text-[#2B221A] text-sm font-medium">

              ₹{{item.price * item.quantity}}

            </p>


          </div>

        <div class="flex justify-between mt-8">

          <button (click)="prevStep()"
                  class="boxe-btn-outline">
            Back
          </button>

          <button (click)="nextStep()"
                  class="boxe-btn">
            Continue
          </button>

        </div>

      </div>



      <!-- STEP 3 PAYMENT -->
      <div *ngIf="currentStep===3">

        <h2 class="section-title mb-6">
          Payment Method
        </h2>


        <!-- PAYMENT OPTIONS -->
        <div class="space-y-3 mb-8">

          <label class="payment-option flex gap-3">

            <input type="radio"
                   value="razorpay"
                   formControlName="paymentMethod">

            Razorpay

          </label>


          <label class="payment-option flex gap-3">

            <input type="radio"
                   value="easebuzz"
                   formControlName="paymentMethod">

            Easebuzz

          </label>

        </div>



        <!-- SUMMARY -->
        <div class="space-y-3 border-t pt-6">

          <div class="flex justify-between">

            <span>Subtotal</span>

            <span>₹{{getSubtotal()}}</span>

          </div>


          <div class="flex justify-between text-green-700">

            <span>Discount (10%)</span>

            <span>-₹{{getDiscount()}}</span>

          </div>


          <div class="bg-green-50 p-2 rounded text-green-800 text-sm">

            🎉 You saved ₹{{getDiscount()}}

          </div>


          <div class="flex justify-between font-semibold text-lg pt-3 border-t">

            <span>Total</span>

            <span>₹{{getTotal()}}</span>

          </div>

        </div>



        <div class="flex justify-between mt-10">

          <button (click)="prevStep()"
                  class="boxe-btn-outline">
            Back
          </button>

          <button (click)="placeOrder()"
                  [disabled]="checkoutForm.invalid"
                  class="boxe-btn">

            Place Order • ₹{{getTotal()}}

          </button>

        </div>


      </div>


    </div>


  </div>



  <!-- MOBILE STICKY BUTTON (NOW INSIDE formGroup ✅) -->

  <div *ngIf="currentStep===3"
       class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 sm:hidden">

    <button (click)="placeOrder()"
            [disabled]="checkoutForm.invalid"
            class="boxe-btn w-full">

      Place Order • ₹{{getTotal()}}

    </button>

  </div>



</div>
