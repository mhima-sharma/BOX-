
<!-- BOXÉ LUXURY CHECKOUT — PREMIUM MINIMAL RESPONSIVE -->

<div class="min-h-screen bg-[#F6F2EC] py-8 px-4 sm:px-6 pb-32 sm:pb-8"
     [formGroup]="checkoutForm">

  <div class="max-w-5xl mx-auto">

    <!-- HEADER -->
    <div class="mb-10 text-center">

      <h1 class="text-[28px] sm:text-[34px]
                 font-serif
                 text-[#2B221A]
                 tracking-[0.08em]">

        CHECKOUT

      </h1>

      <p class="text-[#8B8074]
                text-sm mt-2 tracking-wide">

        Securely complete your order

      </p>

    </div>



    <!-- STEPPER -->
    <div class="flex justify-center mb-12">

      <div class="flex items-center gap-5">

        <div [class]="stepClass(1)"></div>

        <div class="step-line"></div>

        <div [class]="stepClass(2)"></div>

        <div class="step-line"></div>

        <div [class]="stepClass(3)"></div>

      </div>

    </div>



    <!-- MAIN CARD -->
    <div class="bg-white
                border border-[#E8E1D8]
                rounded-2xl
                shadow-[0_8px_30px_rgba(0,0,0,0.04)]
                p-6 sm:p-10">



      <!-- STEP 1 BILLING -->
      <div *ngIf="currentStep===1">

        <h2 class="section-title">

          Billing Information

        </h2>


        <div class="grid sm:grid-cols-2 gap-5">

          <div class="sm:col-span-2">

            <input
              formControlName="fullName"
              placeholder="Full Name"
              class="boxe-input">

          </div>


          <input
            formControlName="email"
            placeholder="Email Address"
            class="boxe-input">


          <input
            formControlName="phoneNumber"
            placeholder="Phone Number"
            class="boxe-input">


          <textarea
            rows="3"
            formControlName="shippingAddress"
            placeholder="Shipping Address"
            class="boxe-input sm:col-span-2">
          </textarea>


        </div>


        <!-- BUTTON -->
        <div class="flex flex-col sm:flex-row gap-3 sm:justify-end mt-10">

          <button
            (click)="nextStep()"
            class="boxe-btn w-full sm:w-auto">

            Continue

          </button>

        </div>


      </div>




      <!-- STEP 2 REVIEW -->
      <div *ngIf="currentStep===2">

        <h2 class="section-title">

          Order Summary

        </h2>



        <div class="divide-y divide-[#F1ECE5]">


          <div *ngFor="let item of cartItems"
               class="flex items-center gap-4 py-5">

            <img
              [src]="item.images?.split(',')[0]"
              class="w-16 h-20 object-cover rounded-md border border-[#EEE6DC]">


            <div class="flex-1">

              <p class="text-[#2B221A] text-sm">

                {{item.title}}

              </p>

              <p class="text-[#8B8074] text-xs mt-1">

                Quantity {{item.quantity}}

              </p>

            </div>


            <p class="text-[#2B221A] text-sm font-medium">

              ₹{{item.price * item.quantity}}

            </p>


          </div>

        </div>



        <!-- BUTTONS -->
        <div class="flex flex-col sm:flex-row gap-3 sm:justify-between mt-10">

          <button
            (click)="prevStep()"
            class="boxe-btn-outline w-full sm:w-auto">

            Back

          </button>


          <button
            (click)="nextStep()"
            class="boxe-btn w-full sm:w-auto">

            Continue

          </button>

        </div>


      </div>




      <!-- STEP 3 PAYMENT -->
      <div *ngIf="currentStep===3">

        <h2 class="section-title">

          Payment Method

        </h2>



        <div class="space-y-3 mb-8">


          <label class="payment-option">

            <input
              type="radio"
              value="razorpay"
              formControlName="paymentMethod">

            Razorpay

          </label>


          <label class="payment-option">

            <input
              type="radio"
              value="easebuzz"
              formControlName="paymentMethod">

            Easebuzz

          </label>


        </div>



        <!-- SUMMARY -->

        <div class="border-t border-[#EEE6DC] pt-6 mb-8 space-y-3">


          <div class="summary-row">

            <span>Subtotal</span>

            <span>₹{{getSubtotal()}}</span>

          </div>


          <div class="summary-row">

            <span>Platform Fee</span>

            <span>₹5</span>

          </div>


          <div class="summary-total">

            <span>Total</span>

            <span>₹{{getTotal()}}</span>

          </div>


        </div>



        <!-- BUTTONS -->
        <div class="flex flex-col sm:flex-row gap-3 sm:justify-between mt-10">

          <button
            (click)="prevStep()"
            class="boxe-btn-outline w-full sm:w-auto">

            Back

          </button>


          <button
            (click)="placeOrder()"
           
            class="boxe-btn w-full sm:w-auto">

            Place Order

          </button>

        </div>


      </div>



    </div>

  </div>

</div>



<!-- MOBILE STICKY PLACE ORDER BUTTON -->

<div *ngIf="currentStep===3"
     class="sm:hidden fixed bottom-0 left-0 w-full bg-white border-t border-[#E8E1D8] p-4 shadow-[0_-4px_20px_rgba(0,0,0,0.06)]">

  <button
    (click)="placeOrder()"
    [disabled]="checkoutForm.invalid"
    class="boxe-btn w-full">

    Place Order • ₹{{getTotal()}}

  </button>

</div>
