  <!-- Main Content -->
  <main class="w-full overflow-y-auto px-3 sm:px-6 md:px-10 lg:px-16 py-6 sm:py-8 md:py-10">


    <div class="max-w-7xl mx-auto font-sans">


      <!-- Header -->
      <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-6 gap-3 sm:gap-4 bg-white p-4 sm:p-6 md:p-7 rounded-2xl shadow-sm">


        <!-- Title -->
        <div>

          <h2 class="text-lg sm:text-xl md:text-2xl font-serif text-[#4B382A]">
            Product Management
          </h2>

          <p class="text-[#7C6A5A] text-xs sm:text-sm">
            Manage all your products easily.
          </p>

        </div>



        <!-- Search -->
        <input
          type="text"
          [(ngModel)]="searchTerm"
          placeholder="Search by title or category..."
          class="px-4 py-2 rounded-lg border border-[#E2DCC8] w-full sm:w-64 md:w-72 focus:outline-none focus:ring-2 focus:ring-[#C6A76E]"
        />


      </div>





      <!-- Loading -->
      <div *ngIf="!isLoading"
           class="flex justify-center items-center py-16">

        <div class="animate-spin rounded-full h-10 w-10 sm:h-12 sm:w-12 border-4 border-[#E2DCC8] border-t-[#C6A76E]"></div>

      </div>





      <!-- No Products -->
      <div *ngIf="!isLoading && products.length === 0"
           class="text-center py-16">

        <p class="text-base sm:text-lg text-[#7C6A5A] font-medium">
          No products found.
        </p>

      </div>






      <!-- Products Grid -->
      <div *ngIf="isLoading && products.length > 0"
           class="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 sm:gap-6">






        <div *ngFor="let product of products"

             class="bg-[#FFF9F0] rounded-2xl shadow-sm overflow-hidden flex flex-col hover:shadow-lg transition">





          <!-- Image -->
          <div class="w-full h-32 sm:h-40 md:h-44">

            <img
              *ngIf="product.images"
              [src]="product.images.split(',')[0]"
              class="w-full h-full object-cover"
            />

          </div>






          <!-- Info -->
          <div class="p-3 sm:p-4 flex flex-col flex-1 justify-between">






            <div>

              <h3 class="text-sm sm:text-base font-semibold text-[#4B382A] truncate">
                {{ product.title }}
              </h3>


              <p class="text-[#7C6A5A] text-xs sm:text-sm line-clamp-2">
                {{ product.description }}
              </p>

            </div>






            <div class=" flex justify-between text-sm">

              <span class="font-semibold text-[#4B382A]">
                ₹{{ product.price }}
              </span>


              <span class="text-[#7C6A5A]">
                Qty: {{ product.quantity }}
              </span>

            </div>






            <div class=" text-xs sm:text-sm text-[#7C6A5A]">
              Category: {{ product.category }}
            </div>






            <!-- Buttons -->
            <div class=" flex flex-col sm:flex-row gap-2">


              <button
                (click)="editProduct(product.id)"
                class="flex-1 bg-[#C6A76E] hover:bg-[#B59853] text-white py-2 rounded-lg text-xs sm:text-sm transition">

                Edit

              </button>




              <button
                (click)="deleteProduct(product.id)"
                class="flex-1 bg-[#A94A3E] hover:bg-[#8C3F34] text-white py-2 rounded-lg text-xs sm:text-sm transition">

                Delete

              </button>


            </div>






          </div>


        </div>






      </div>





    </div>


  </main>
