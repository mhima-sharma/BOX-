<div class="flex bg-[#F6F1EB] min-h-screen">

  <!-- Mobile Top Bar -->
  <div class="fixed top-0 left-0 right-0 bg-[#F9F5F0] border-b border-[#E1D7CD] shadow-md flex items-center justify-between p-4 md:hidden z-50">

    <h2 class="text-lg font-bold text-[#8B5E3C]">
      Admin Panel
    </h2>

    <button
      (click)="isSidebarOpen = !isSidebarOpen"
      class="text-[#8B5E3C] text-2xl">

      ☰

    </button>

  </div>


  <!-- Sidebar -->
  <aside
    [class.translate-x-0]="isSidebarOpen"
    [class.-translate-x-full]="!isSidebarOpen"
    class="fixed top-0 left-0 h-screen w-64 bg-[#F9F5F0] border-r border-[#E1D7CD] shadow-lg transform md:translate-x-0 transition-transform duration-300 z-50">

    <div class="p-6 mt-12 md:mt-0">

      <h2 class="text-2xl font-bold text-[#8B5E3C] mb-8 hidden md:block">
        Admin Panel
      </h2>

      <nav class="space-y-3 text-sm font-medium">

        <a routerLink="/admindash"
           (click)="isSidebarOpen=false"
           routerLinkActive="bg-[#F3E8D0] text-[#C6A76E]"
           class="block py-3 px-4 rounded-lg hover:bg-[#F3E8D0] transition">
          Dashboard
        </a>

        <a routerLink="/products"
           (click)="isSidebarOpen=false"
           routerLinkActive="bg-[#F3E8D0] text-[#C6A76E]"
           class="block py-3 px-4 rounded-lg hover:bg-[#F3E8D0] transition">
          Manage Products
        </a>

        <a routerLink="/all-orders"
           (click)="isSidebarOpen=false"
           routerLinkActive="bg-[#F3E8D0] text-[#C6A76E]"
           class="block py-3 px-4 rounded-lg hover:bg-[#F3E8D0] transition">
          All Orders
        </a>

        <a routerLink="/addProduct"
           (click)="isSidebarOpen=false"
           routerLinkActive="bg-[#F3E8D0] text-[#C6A76E]"
           class="block py-3 px-4 rounded-lg hover:bg-[#F3E8D0] transition">
          Add Product
        </a>

      </nav>

    </div>

  </aside>


  <!-- Overlay (Mobile only) -->
  <div
    *ngIf="isSidebarOpen"
    (click)="isSidebarOpen=false"
    class="fixed inset-0 bg-black bg-opacity-40 z-40 md:hidden">
  </div>


  <!-- Main Content -->
  <div class="flex-1 md:ml-64 pt-16 md:pt-0 p-4 md:p-8 overflow-y-auto h-screen">

    <router-outlet></router-outlet>

  </div>


</div>
