<app-header></app-header>

<!-- PRODUCT DETAILS SECTION -->
<section class="pt-24 pb-20 px-6 md:px-16 bg-[#F6F1EB]" *ngIf="product">

  <div class="max-w-7xl mx-auto grid lg:grid-cols-2 gap-14 items-start">

    <!-- PRODUCT IMAGES -->
    <div class="w-full">

      <div class="flex gap-4 overflow-x-auto pb-4">

        <div
          *ngFor="let img of product.images?.split(',')"
          class="min-w-[220px] md:min-w-[300px] h-[320px] md:h-[420px] overflow-hidden rounded-2xl border border-[#EADFD6] shadow-sm group"
        >
          <img
            [src]="img"
            alt="Plant image"
            class="w-full h-full object-cover transition duration-500 group-hover:scale-105"
          />
        </div>

      </div>

    </div>


    <!-- PRODUCT DETAILS -->
    <div>

      <h1 class="text-3xl md:text-5xl font-semibold text-[#3E2F2B] leading-tight">
        {{ product.title }}
      </h1>

      <p class="mt-4 text-xl md:text-2xl text-[#C6A76E] font-medium">
        ₹{{ product.price }}
      </p>

      <p class="mt-6 text-[#5C4B45] leading-relaxed text-base md:text-lg">
        {{ product.description }}
      </p>

      <div class="mt-8 border-t border-[#EADFD6] pt-6">
        <p class="text-sm text-[#8A776F] leading-relaxed">
          Carefully selected to elevate your living space.
          Easy to maintain and perfect for modern interiors.
        </p>
      </div>

      <!-- QUANTITY -->
      <div class="mt-8 flex items-center gap-6">

        <span class="uppercase tracking-widest text-sm text-[#8A776F]">
          Quantity
        </span>

        <div class="flex items-center border border-[#EADFD6]">

          <button
            (click)="decreaseQuantity()"
            [disabled]="selectedQuantity <= 1"
            class="px-4 py-2 text-lg hover:bg-[#EADFD6] transition disabled:opacity-40"
          >
            −
          </button>

          <span class="px-6 text-lg">
            {{ selectedQuantity }}
          </span>

          <button
            (click)="increaseQuantity()"
            [disabled]="selectedQuantity >= product.quantity"
            class="px-4 py-2 text-lg hover:bg-[#EADFD6] transition disabled:opacity-40"
          >
            +
          </button>

        </div>

      </div>

      <!-- ADD TO CART -->
      <button
        (click)="addToCart()"
        [disabled]="product.quantity === 0"
        class="mt-10 w-full md:w-auto px-10 py-4 bg-[#3E2F2B] text-white uppercase tracking-wider text-sm hover:bg-[#C6A76E] transition duration-300 disabled:opacity-50 disabled:cursor-not-allowed"
      >
        {{ product.quantity === 0 ? 'Out of Stock' : 'Add to Cart' }}
      </button>

    </div>

  </div>

</section>

<app-footer></app-footer>
