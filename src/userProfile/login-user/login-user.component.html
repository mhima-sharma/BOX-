<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-[#F5EFE6] via-[#EFE6D8] to-[#E8DDC8] px-4 py-10">

  <div class="w-full max-w-md bg-white/90 backdrop-blur-md rounded-3xl shadow-[0_20px_60px_rgba(0,0,0,0.08)] p-8 sm:p-10 border border-[#E6D7C3]">

    <!-- Brand Logo / Image -->
    <div class="flex justify-center mb-6">
      <img
        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQJlr9qL4ZVmDhGOhj8nQobSoR55r6j_foAlQ&s"
        class="w-20 h-20 rounded-full object-cover border border-[#D6C2A8] shadow-sm" />
    </div>

    <!-- Title -->
    <div class="text-center mb-8">
      <h2 class="text-3xl sm:text-4xl font-serif tracking-wide text-[#3E2C23]">
        Welcome Back
      </h2>
      <p class="text-sm text-[#7A6A58] mt-2 tracking-wide">
        Sign in to continue your BOXÉ experience
      </p>
    </div>

    <!-- Divider -->
    <div class="flex items-center gap-3 mb-8">
      <div class="flex-1 h-px bg-[#E5D6C3]"></div>
      <span class="text-xs tracking-widest text-[#B89B72] uppercase">Login</span>
      <div class="flex-1 h-px bg-[#E5D6C3]"></div>
    </div>

    <!-- Login Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="space-y-6">

      <!-- Email -->
      <div>
        <label for="email" class="block text-sm tracking-wide text-[#5E4A3B] mb-2">
          Email Address
        </label>
        <input
          type="email"
          id="email"
          formControlName="email"
          placeholder="you@boxeplants.com"
          class="w-full px-4 py-3 rounded-xl border border-[#E0D2C0] bg-[#FAF7F2] focus:border-[#B89B72] focus:ring-1 focus:ring-[#C6A87D] outline-none transition duration-300 text-[#3E2C23]" />
      </div>

      <!-- Password -->
      <div class="relative">
        <label for="password" class="block text-sm tracking-wide text-[#5E4A3B] mb-2">
          Password
        </label>

        <input
          [type]="showPassword ? 'text' : 'password'"
          id="password"
          formControlName="password"
          placeholder="••••••••"
          class="w-full px-4 py-3 rounded-xl border border-[#E0D2C0] bg-[#FAF7F2] focus:border-[#B89B72] focus:ring-1 focus:ring-[#C6A87D] outline-none transition duration-300 pr-12 text-[#3E2C23]" />

        <button
          type="button"
          class="absolute right-3 top-[42px] text-[#8A7763] hover:text-[#3E2C23] transition"
          (click)="togglePassword()">
          <i
            class="fas"
            [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'">
          </i>
        </button>
      </div>

      <!-- CTA Button -->
      <button
        type="submit"
        [disabled]="loginForm.invalid"
        class="w-full bg-[#3E2C23] hover:bg-[#2C1F18] text-white py-3 rounded-full text-sm tracking-widest uppercase transition-all duration-300 shadow-md disabled:opacity-40 disabled:cursor-not-allowed">
        Sign In
      </button>
      <button
          type="button"
          routerLink="/"
          class="w-full border border-[#C6A87D] text-[#5E4A3B] py-3 rounded-full text-sm tracking-widest uppercase transition-all duration-300 hover:bg-[#C6A87D] hover:text-white mt-2">
          View as Guest

      </button>

      <!-- Signup Link -->
      <p class="text-sm text-center text-[#7A6A58] mt-4">
        New to BOXÉ?
        <a routerLink="/signup-user"
           class="text-[#B89B72] font-medium hover:underline transition">
          Create Account
        </a>
      </p>

    </form>

    <!-- Admin Login -->
    <div class="mt-6 pt-6 border-t border-[#EFE3D4] text-center">
      <p class="text-xs text-[#9C8774] tracking-wide">
        Admin access?
        <a routerLink="/admin-login"
           class="text-[#3E2C23] font-medium hover:underline">
          Login here
        </a>
      </p>
    </div>

  </div>
</div>
