<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-[#F5EFE6] via-[#EFE6D8] to-[#E8DDC8] px-4 py-10">

  <div class="w-full max-w-md bg-white/95 backdrop-blur-md rounded-3xl shadow-[0_20px_60px_rgba(0,0,0,0.08)] p-8 sm:p-10 border border-[#E6D7C3]">

    <!-- Brand Mark -->
    <div class="flex justify-center mb-6">
      <div class="w-20 h-20 rounded-full flex items-center justify-center bg-[#FAF7F2] border border-[#D6C2A8] shadow-sm">
        <span class="text-2xl font-serif text-[#3E2C23] tracking-wide">B</span>
      </div>
    </div>

    <!-- Heading -->
    <div class="text-center mb-8">
      <h2 class="text-3xl sm:text-4xl font-serif tracking-wide text-[#3E2C23]">
        Create Your Account
      </h2>
      <p class="text-sm text-[#7A6A58] mt-2 tracking-wide">
        Join the refined world of BOXÉ plants
      </p>
    </div>

    <!-- Divider -->
    <div class="flex items-center gap-3 mb-8">
      <div class="flex-1 h-px bg-[#E5D6C3]"></div>
      <span class="text-xs tracking-widest text-[#B89B72] uppercase">
        Register
      </span>
      <div class="flex-1 h-px bg-[#E5D6C3]"></div>
    </div>

    <!-- Form -->
    <form [formGroup]="signupForm" (ngSubmit)="onSignup()" class="space-y-6">

      <!-- Full Name -->
      <div>
        <label for="name" class="block text-sm tracking-wide text-[#5E4A3B] mb-2">
          Full Name
        </label>
        <input
          type="text"
          id="name"
          formControlName="name"
          placeholder="John Leaflover"
          class="w-full px-4 py-3 rounded-xl border border-[#E0D2C0] bg-[#FAF7F2] focus:border-[#B89B72] focus:ring-1 focus:ring-[#C6A87D] outline-none transition duration-300 text-[#3E2C23]" />
      </div>

      <!-- Email -->
      <div>
        <label for="email" class="block text-sm tracking-wide text-[#5E4A3B] mb-2">
          Email Address
        </label>
        <input
          type="email"
          id="email"
          formControlName="email"
          placeholder="you@boxeplants.com"
          class="w-full px-4 py-3 rounded-xl border border-[#E0D2C0] bg-[#FAF7F2] focus:border-[#B89B72] focus:ring-1 focus:ring-[#C6A87D] outline-none transition duration-300 text-[#3E2C23]" />
      </div>

      <!-- Password -->
      <div class="relative">
        <label for="password" class="block text-sm tracking-wide text-[#5E4A3B] mb-2">
          Password
        </label>
        <input
          [type]="showPassword ? 'text' : 'password'"
          id="password"
          formControlName="password"
          placeholder="••••••••"
          class="w-full px-4 py-3 pr-12 rounded-xl border border-[#E0D2C0] bg-[#FAF7F2] focus:border-[#B89B72] focus:ring-1 focus:ring-[#C6A87D] outline-none transition duration-300 text-[#3E2C23]" />

        <button
          type="button"
          class="absolute right-3 top-[42px] text-[#8A7763] hover:text-[#3E2C23] transition"
          (click)="togglePassword()">
          <i
            class="fas"
            [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'">
          </i>
        </button>
      </div>

      <!-- Confirm Password -->
      <div class="relative">
        <label for="confirmPassword" class="block text-sm tracking-wide text-[#5E4A3B] mb-2">
          Confirm Password
        </label>
        <input
          [type]="showConfirmPassword ? 'text' : 'password'"
          id="confirmPassword"
          formControlName="confirmPassword"
          placeholder="••••••••"
          class="w-full px-4 py-3 pr-12 rounded-xl border border-[#E0D2C0] bg-[#FAF7F2] focus:border-[#B89B72] focus:ring-1 focus:ring-[#C6A87D] outline-none transition duration-300 text-[#3E2C23]" />

        <button
          type="button"
          class="absolute right-3 top-[42px] text-[#8A7763] hover:text-[#3E2C23] transition"
          (click)="toggleConfirmPassword()">
          <i
            class="fas"
            [ngClass]="showConfirmPassword ? 'fa-eye-slash' : 'fa-eye'">
          </i>
        </button>
      </div>

      <!-- Error Message -->
      <div
        class="text-sm text-[#A94442] bg-[#F8EDEB] border border-[#E6CFCB] px-4 py-2 rounded-lg"
        *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        [disabled]="signupForm.invalid"
        class="w-full bg-[#3E2C23] hover:bg-[#2C1F18] text-white py-3 rounded-full text-sm tracking-widest uppercase transition-all duration-300 shadow-md disabled:opacity-40 disabled:cursor-not-allowed">
        Create Account
      </button>

      <!-- Login Link -->
      <p class="text-center text-sm text-[#7A6A58] mt-6">
        Already registered?
        <a routerLink="/user-login"
           class="text-[#B89B72] font-medium hover:underline transition">
          Sign In
        </a>
      </p>

    </form>

  </div>
</div>
