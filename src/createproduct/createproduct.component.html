<div class="min-h-screen bg-[#F5F1EA] px-3 sm:px-6 lg:px-10 py-6">

  <div class="max-w-5xl mx-auto bg-white rounded-3xl shadow-[0_10px_40px_rgba(0,0,0,0.06)] overflow-hidden">

    <!-- Header -->
    <div class="bg-[#EFE8DE] px-6 sm:px-10 py-10 text-center">
      <h2 class="text-2xl sm:text-3xl lg:text-4xl font-serif text-[#4A3F35]">
        Add New Product
      </h2>
      <p class="text-[11px] sm:text-xs tracking-[0.3em] text-[#8C7B6B] mt-2">
        BOXÉ Premium Collection
      </p>
    </div>

    <!-- Form -->
    <form
      [formGroup]="productForm"
      (ngSubmit)="submitForm()"
      class="px-5 sm:px-8 lg:px-12 py-8 space-y-6"
    >

      <!-- Grid Section -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5 lg:gap-6">

        <!-- Title -->
        <div class="sm:col-span-2">
          <label class="block text-xs uppercase tracking-wider text-[#6E6257] mb-2">
            Product Title
          </label>
          <input
            formControlName="title"
            type="text"
            placeholder="Enter product title"
            class="w-full px-4 py-3 text-sm bg-[#F8F6F2] border border-[#E5DED3] rounded-xl focus:outline-none focus:ring-2 focus:ring-[#C6A76E] transition"
          />
        </div>

        <!-- Category -->
        <div>
          <label class="block text-xs uppercase tracking-wider text-[#6E6257] mb-2">
            Category
          </label>
          <select
            formControlName="category"
            class="w-full px-4 py-3 text-sm bg-[#F8F6F2] border border-[#E5DED3] rounded-xl focus:outline-none focus:ring-2 focus:ring-[#C6A76E] transition"
          >
            <option value="">Select category</option>
            <option value="Jewelry">Jewelry</option>
            <option value="Flowers">Flowers</option>
            <option value="Chocolates">Chocolates</option>
            <option value="Gift Hampers">Gift Hampers</option>
            <option value="Soft Toys">Soft Toys</option>
            <option value="Perfumes">Perfumes</option>
            <option value="Watches">Watches</option>
            <option value="Greeting Cards">Greeting Cards</option>
            <option value="Luxury Gifts">Luxury Gifts</option>
            <option value="Corporate Gifts">Corporate Gifts</option>
          </select>
        </div>

        <!-- Quantity -->
        <div>
          <label class="block text-xs uppercase tracking-wider text-[#6E6257] mb-2">
            Quantity
          </label>
          <input
            formControlName="quantity"
            type="number"
            placeholder="Enter quantity"
            class="w-full px-4 py-3 text-sm bg-[#F8F6F2] border border-[#E5DED3] rounded-xl focus:outline-none focus:ring-2 focus:ring-[#C6A76E] transition"
          />
        </div>

        <!-- Price -->
        <div>
          <label class="block text-xs uppercase tracking-wider text-[#6E6257] mb-2">
            Price (₹)
          </label>
          <input
            formControlName="price"
            type="number"
            step="0.01"
            placeholder="Enter price"
            class="w-full px-4 py-3 text-sm bg-[#F8F6F2] border border-[#E5DED3] rounded-xl focus:outline-none focus:ring-2 focus:ring-[#C6A76E] transition"
          />
        </div>

        <!-- Upload -->
        <div class="sm:col-span-2">
          <label class="block text-xs uppercase tracking-wider text-[#6E6257] mb-2">
            Upload Images
          </label>
          <input
            type="file"
            multiple
            (change)="onFileChange($event)"
            class="w-full px-4 py-3 text-sm bg-[#F8F6F2] border border-dashed border-[#D8CFC2] rounded-xl focus:outline-none focus:ring-2 focus:ring-[#C6A76E] file:mr-4 file:px-4 file:py-2 file:rounded-full file:border-0 file:text-xs file:bg-[#E8DFD1] file:text-[#4A3F35] cursor-pointer"
          />
        </div>

      </div>

      <!-- Description -->
      <div>
        <label class="block text-xs uppercase tracking-wider text-[#6E6257] mb-2">
          Description
        </label>
        <textarea
          formControlName="description"
          rows="4"
          placeholder="Enter product details..."
          class="w-full px-4 py-3 text-sm bg-[#F8F6F2] border border-[#E5DED3] rounded-xl focus:outline-none focus:ring-2 focus:ring-[#C6A76E] transition"
        ></textarea>
      </div>

      <!-- Submit -->
      <div class="pt-4">
        <button
          type="submit"
          class="w-full sm:w-auto sm:px-12 bg-[#4A3F35] text-white text-sm tracking-wider py-3 rounded-xl hover:bg-[#3B332B] transition duration-300"
        >
          Add Product
        </button>
      </div>

    </form>

  </div>
</div>
