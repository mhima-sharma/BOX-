<div class="flex min-h-screen bg-[#F5F1EA]">

  <!-- Main -->
  <div class="flex-1 px-4 sm:px-6 py-6">

    <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-[0_8px_30px_rgba(0,0,0,0.06)] overflow-hidden">

      <!-- Header -->
     

      <!-- Form -->
      <form
        [formGroup]="productForm"
        (ngSubmit)="submitForm()"
        class="p-5 sm:p-6 space-y-5"
      >
 <div class="h-28 bg-[#EFE8DE] flex items-center justify-center">
        <div class="text-center">
          <h2 class="text-2xl sm:text-3xl font-serif text-[#4A3F35]">
            Add New Product
          </h2>
          <p class="text-[11px] tracking-[0.2em] text-[#8C7B6B] mt-1">
            BOXÉ Premium Collection
          </p>
        </div>
      </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

          <!-- Title -->
          <div>
            <label class="block text-xs text-[#6E6257] mb-1">
              Product Title
            </label>
            <input
              formControlName="title"
              type="text"
              placeholder="Enter title"
              class="w-full px-3 py-2 text-sm bg-[#F8F6F2] border border-[#E5DED3] rounded-lg focus:outline-none focus:ring-1 focus:ring-[#C6A76E]"
            />
          </div>

          <!-- Category -->
          <div>
            <label class="block text-xs text-[#6E6257] mb-1">
              Category
            </label>
            <select
              formControlName="category"
              class="w-full px-3 py-2 text-sm bg-[#F8F6F2] border border-[#E5DED3] rounded-lg focus:outline-none focus:ring-1 focus:ring-[#C6A76E]"
            >
              <option value="">Select category</option>
              <option value="Jewelry">Jewelry</option>
              <option value="Flowers">Flowers</option>
              <option value="Chocolates">Chocolates</option>
              <option value="Gift Hampers">Gift Hampers</option>
              <option value="Soft Toys">Soft Toys</option>
              <option value="Perfumes">Perfumes</option>
              <option value="Watches">Watches</option>
              <option value="Greeting Cards">Greeting Cards</option>
              <option value="Luxury Gifts">Luxury Gifts</option>
              <option value="Corporate Gifts">Corporate Gifts</option>
            </select>
          </div>

          <!-- Quantity -->
          <div>
            <label class="block text-xs text-[#6E6257] mb-1">
              Quantity
            </label>
            <input
              formControlName="quantity"
              type="number"
              placeholder="Qty"
              class="w-full px-3 py-2 text-sm bg-[#F8F6F2] border border-[#E5DED3] rounded-lg focus:outline-none focus:ring-1 focus:ring-[#C6A76E]"
            />
          </div>

          <!-- Price -->
          <div>
            <label class="block text-xs text-[#6E6257] mb-1">
              Price (₹)
            </label>
            <input
              formControlName="price"
              type="number"
              step="0.01"
              placeholder="Price"
              class="w-full px-3 py-2 text-sm bg-[#F8F6F2] border border-[#E5DED3] rounded-lg focus:outline-none focus:ring-1 focus:ring-[#C6A76E]"
            />
          </div>

          <!-- Upload -->
          <div class="md:col-span-2">
            <label class="block text-xs text-[#6E6257] mb-1">
              Upload Images
            </label>
            <input
              type="file"
              multiple
              (change)="onFileChange($event)"
              class="w-full px-3 py-2 text-sm bg-[#F8F6F2] border border-dashed border-[#D8CFC2] rounded-lg focus:outline-none focus:ring-1 focus:ring-[#C6A76E] file:mr-3 file:px-3 file:py-1 file:rounded-full file:border-0 file:text-xs file:bg-[#E8DFD1] file:text-[#4A3F35]"
            />
          </div>

        </div>

        <!-- Description -->
        <div>
          <label class="block text-xs text-[#6E6257] mb-1">
            Description
          </label>
          <textarea
            formControlName="description"
            rows="3"
            placeholder="Product details..."
            class="w-full px-3 py-2 text-sm bg-[#F8F6F2] border border-[#E5DED3] rounded-lg focus:outline-none focus:ring-1 focus:ring-[#C6A76E]"
          ></textarea>
        </div>

        <!-- Button -->
        <div class="pt-2">
          <button
            type="submit"
            class="w-full bg-[#4A3F35] text-white text-sm tracking-wide py-2.5 rounded-lg hover:bg-[#3B332B] transition"
          >
            Add Product
          </button>
        </div>

      </form>

    

    </div>
  </div>
</div>
