<!-- BOXÉ Luxury Payment Failed Page -->

<div class="min-h-screen flex items-center justify-center px-4 py-12 bg-[#F5F1EA]">

  <!-- Card -->
  <div
    class="w-full max-w-md bg-[#FAF8F3] border border-[#E8E2D9] rounded-3xl shadow-[0_20px_60px_rgba(0,0,0,0.08)] p-8 text-center">

    <!-- Icon -->
    <div class="flex justify-center mb-6">
      <div
        class="w-20 h-20 flex items-center justify-center rounded-full bg-[#F1ECE3] border border-[#E5DED3]">

        <svg
          class="w-10 h-10 text-[#8C6A43]"
          fill="none"
          stroke="currentColor"
          stroke-width="1.2"
          viewBox="0 0 24 24">

          <path stroke-linecap="round"
                stroke-linejoin="round"
                d="M6 18L18 6M6 6l12 12" />

        </svg>

      </div>
    </div>


    <!-- Title -->
    <h1 class="text-2xl md:text-3xl font-light text-[#3E3E3E] tracking-wide mb-3">

      Payment Failed

    </h1>


    <!-- Subtitle -->
    <p class="text-sm text-[#8B8174] mb-6">

      Your transaction could not be completed.  
      Please review the details below and try again.

    </p>


    <!-- Details -->
    <div class="space-y-3 text-sm text-[#5C5C5C] mb-8">

      <div class="flex justify-between border-b border-[#E8E2D9] pb-2">

        <span class="text-[#8B8174]">Transaction ID</span>

        <span class="font-medium text-[#3E3E3E] break-all">

          {{ txnid }}

        </span>

      </div>


      <div class="flex justify-between border-b border-[#E8E2D9] pb-2">

        <span class="text-[#8B8174]">Amount</span>

        <span class="font-medium text-[#3E3E3E]">

          ₹{{ amount }}

        </span>

      </div>


      <div class="flex justify-between">

        <span class="text-[#8B8174]">Status</span>

        <span class="font-medium text-[#8C6A43] capitalize">

          {{ status }}

        </span>

      </div>

    </div>



    <!-- Actions -->
    <div class="flex flex-col sm:flex-row gap-3">


      <!-- Home Button -->
      <a
        routerLink="/show"
        class="flex-1 border border-[#D6C7B2]
               text-[#3E3E3E]
               py-3 rounded-full
               text-sm tracking-wide
               hover:bg-[#F1ECE3]
               transition-all duration-300">

        Return Home

      </a>



      <!-- Retry Button -->
      <a
        routerLink="/cart"
        class="flex-1 bg-[#3E3E3E]
               text-white
               py-3 rounded-full
               text-sm tracking-wide
               hover:bg-[#2A2A2A]
               transition-all duration-300
               shadow-sm">

        Try Again

      </a>


    </div>


  </div>

</div>
